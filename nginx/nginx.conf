server {
    listen 80;
    server_name yourdomain.com; # Replace with your actual domain

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ai_employee_access.log;
    error_log /var/log/nginx/ai_employee_error.log;

    location / {
        proxy_pass http://localhost:8000; # Forward to the AI Employee API/Dashboard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Signal folder access (optional, if you want to browse logs via web)
    location /logs {
        alias /app/Vault/Workflow/Logs;
        autoindex on;
    }
}

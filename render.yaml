services:
  # 1. Background Worker (Platinum Sync & Watchers)
  - type: worker
    name: ai-employee-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cloud_startup.py
    envVars:
      - key: PLATINUM_MODE
        value: cloud
      - key: SYNC_INTERVAL
        value: 300
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromParam: database_url
      - key: SECRET_KEY
        fromParam: secret_key
      - key: JWT_SECRET_KEY
        fromParam: jwt_secret_key
      - key: GMAIL_TOKEN
        fromParam: gmail_token
      - key: OPENAI_API_KEY
        fromParam: openai_api_key

  # 2. Web Service (FastAPI Backend)
  - type: web
    name: ai-employee-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_employee.api.server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromParam: database_url
      - key: SECRET_KEY
        fromParam: secret_key
      - key: JWT_SECRET_KEY
        fromParam: jwt_secret_key

parameters:
  - key: database_url
    description: Neon PostgreSQL Connection URL (postgresql://...)
  - key: secret_key
    description: Main Application Secret Key
  - key: jwt_secret_key
    description: JWT Signing Secret Key
  - key: gmail_token
    description: Google/Gmail API Token
  - key: openai_api_key
    description: OpenAI API Key for AI features

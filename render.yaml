services:
  # 1. Background Worker (Platinum Sync & Watchers)
  - type: worker
    name: ai-employee-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cloud_startup.py
    envVars:
      - key: PLATINUM_MODE
        value: "cloud"
      - key: SYNC_INTERVAL
        value: "300"
      - key: PYTHONUNBUFFERED
        value: "1"
      - fromGroup: ai-employee-secrets

  # 2. Web Service (FastAPI Backend)
  - type: web
    name: ai-employee-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_employee.api.server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - fromGroup: ai-employee-secrets

envVarGroups:
  - name: ai-employee-secrets
    envVars:
      - key: DATABASE_URL
      - key: SECRET_KEY
      - key: JWT_SECRET_KEY
      - key: GMAIL_TOKEN
      - key: OPENAI_API_KEY

services:
  # 1. Background Worker (Cloud Node)
  - type: "worker"
    name: "ai-employee-worker"
    runtime: "python"
    plan: "starter"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/cloud_startup.py"
    envVars:
      - fromGroup: "ai-employee-shared"
      - key: "PLATINUM_MODE"
        value: "cloud"
      - key: "SYNC_INTERVAL"
        value: "300"
      - key: "PYTHONUNBUFFERED"
        value: "1"

  # 2. Web Service (FastAPI Backend API)
  - type: "web"
    name: "ai-employee-api"
    runtime: "python"
    plan: "free"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn ai_employee.api.server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - fromGroup: "ai-employee-shared"
      - key: "PYTHONUNBUFFERED"
        value: "1"

envVarGroups:
  - name: "ai-employee-shared"
    envVars:
      - key: "DATABASE_URL"
        sync: false
      - key: "SECRET_KEY"
        sync: false
      - key: "JWT_SECRET_KEY"
        sync: false
      - key: "OPENAI_API_KEY"
        sync: false
      - key: "GMAIL_TOKEN"
        sync: false

services:
  # 1. Combined Web & Background Service (FREE TIER)
  - type: "web"
    name: "ai-employee-all-in-one"
    runtime: "python"
    plan: "free"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/cloud_startup_combined.py"
    envVars:
      - fromGroup: "ai-employee-shared"
      - key: "PLATINUM_MODE"
        value: "cloud"
      - key: "SYNC_INTERVAL"
        value: "300"
      - key: "PYTHONUNBUFFERED"
        value: "1"
      - key: "PYTHON_VERSION"
        value: "3.12.1"
      # Paths ko explicitly relative kar rahe hain taake /Vault permissions ka error na aaye
      - key: "INBOX_PATH"
        value: "./Vault/Workflow/Inbox"
      - key: "NEEDS_ACTION_PATH"
        value: "./Vault/Workflow/Needs_Action"
      - key: "DONE_PATH"
        value: "./Vault/Workflow/Done"
      - key: "LOGS_PATH"
        value: "./Vault/Workflow/Logs"
      - key: "PENDING_APPROVAL_PATH"
        value: "./Vault/Workflow/Pending_Approval"
      - key: "APPROVED_PATH"
        value: "./Vault/Workflow/Approved"

envVarGroups:
  - name: "ai-employee-shared"
    envVars:
      - key: "DATABASE_URL"
        sync: false
      - key: "SECRET_KEY"
        sync: false
      - key: "JWT_SECRET_KEY"
        sync: false
      - key: "GEMINI_API_KEY"
        sync: false
      - key: "OPENAI_API_KEY"
        sync: false
      - key: "GMAIL_TOKEN"
        sync: false

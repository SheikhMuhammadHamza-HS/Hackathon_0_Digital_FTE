services:
  # 1. Background Worker (Cloud Node)
  - type: worker
    name: ai-employee-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cloud_startup.py
    envVars:
      - key: PLATINUM_MODE
        value: "cloud"
      - key: SYNC_INTERVAL
        value: "300"
      - key: DATABASE_URL
        fromParameter: database_url
      - key: SECRET_KEY
        fromParameter: secret_key
      - key: JWT_SECRET_KEY
        fromParameter: jwt_secret_key
      - key: GMAIL_TOKEN
        fromParameter: gmail_token
      - key: OPENAI_API_KEY
        fromParameter: openai_api_key

  # 2. Web Service (FastAPI API)
  - type: web
    name: ai-employee-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_employee.api.server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromParameter: database_url
      - key: SECRET_KEY
        fromParameter: secret_key
      - key: JWT_SECRET_KEY
        fromParameter: jwt_secret_key

parameters:
  - key: database_url
    description: Neon PostgreSQL connection URL
    required: true
  - key: secret_key
    description: Application secret key
    required: true
  - key: jwt_secret_key
    description: JWT secret key
    required: true
  - key: gmail_token
    description: Gmail JSON token content (optional)
    required: false
  - key: openai_api_key
    description: OpenAI API Key
    required: true

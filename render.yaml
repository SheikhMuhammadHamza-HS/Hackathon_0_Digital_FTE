services:
  # 1. Background Worker (Cloud Node - Platinum Mode)
  - type: worker
    name: ai-employee-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cloud_startup.py
    envVars:
      - key: PLATINUM_MODE
        value: "cloud"
      - key: SYNC_INTERVAL
        value: "300"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromParameter: database_url
      - key: SECRET_KEY
        fromParameter: secret_key
      - key: JWT_SECRET_KEY
        fromParameter: jwt_secret_key
      - key: GMAIL_TOKEN
        fromParameter: gmail_token
      - key: OPENAI_API_KEY
        fromParameter: openai_api_key

  # 2. Web Service (FastAPI Backend API)
  - type: web
    name: ai-employee-api
    env: python
    plan: free # Change to 'starter' for more performance
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_employee.api.server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromParameter: database_url
      - key: SECRET_KEY
        fromParameter: secret_key
      - key: JWT_SECRET_KEY
        fromParameter: jwt_secret_key
      - key: PYTHONUNBUFFERED
        value: "1"

parameters:
  - key: database_url
    description: Neon PostgreSQL connection URL (postgresql://user:pass@host/db)
    required: true
  - key: secret_key
    description: Application secret key for signing data
    required: true
  - key: jwt_secret_key
    description: Secret key for generating JWT authentication tokens
    required: true
  - key: gmail_token
    description: Google/Gmail API JSON token content for email automation
    required: false
  - key: openai_api_key
    description: OpenAI API Key for AI employee logic and reporting
    required: true

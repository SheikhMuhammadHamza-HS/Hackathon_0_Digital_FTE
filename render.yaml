services:
  # 1. Combined Web & Background Service (FREE TIER)
  - type: "web"
    name: "ai-employee-all-in-one"
    runtime: "python"
    plan: "free"
    buildCommand: "pip install -r requirements.txt"
    # Hum API start karte waqt hi background scripts ko bhi start kar denge
    startCommand: "python scripts/cloud_startup_combined.py"
    envVars:
      - fromGroup: "ai-employee-shared"
      - key: "PLATINUM_MODE"
        value: "cloud"
      - key: "SYNC_INTERVAL"
        value: "300"
      - key: "PYTHONUNBUFFERED"
        value: "1"

envVarGroups:
  - name: "ai-employee-shared"
    envVars:
      - key: "DATABASE_URL"
        sync: false
      - key: "SECRET_KEY"
        sync: false
      - key: "JWT_SECRET_KEY"
        sync: false
      - key: "OPENAI_API_KEY"
        sync: false
      - key: "GMAIL_TOKEN"
        sync: false
